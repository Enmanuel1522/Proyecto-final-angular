<div class="page">
  <div class="bg-overlay"></div>

  <!-- Partículas flotantes -->
  <span class="particle" *ngFor="let p of particles"
    [style.left]="p.x"
    [style.top]="p.y"
    [style.animationDelay]="p.delay">
  </span>

  <!-- Pokebolas flotantes de fondo -->
  <svg *ngFor="let b of bgPokeballs"
    class="bg-pokeball"
    [style.width.px]="b.size"
    [style.height.px]="b.size"
    [style.left]="b.left"
    [style.right]="b.right"
    [style.top]="b.top"
    [style.animationDuration]="b.duration"
    [style.animationDelay]="b.delay"
    viewBox="0 0 100 100">
    <path d="M50 5 A45 45 0 0 1 95 50 L65 50 A15 15 0 0 0 35 50 L5 50 A45 45 0 0 1 50 5Z" fill="#cc3333"/>
    <path d="M5 50 A45 45 0 0 0 95 50 L65 50 A15 15 0 0 1 35 50 L5 50Z" fill="#f2f2f2"/>
    <line x1="5" y1="50" x2="35" y2="50" stroke="#1a1f2e" stroke-width="3"/>
    <line x1="65" y1="50" x2="95" y2="50" stroke="#1a1f2e" stroke-width="3"/>
    <circle cx="50" cy="50" r="45" fill="none" stroke="#1a1f2e" stroke-width="4"/>
    <circle cx="50" cy="50" r="12" fill="#f2f2f2" stroke="#1a1f2e" stroke-width="3"/>
    <circle cx="50" cy="50" r="6" fill="#ffffff" stroke="#1a1f2e" stroke-width="2"/>
  </svg>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <svg class="pokeball-icon" width="28" height="28" viewBox="0 0 100 100">
        <path d="M50 5 A45 45 0 0 1 95 50 L65 50 A15 15 0 0 0 35 50 L5 50 A45 45 0 0 1 50 5Z" fill="#cc3333"/>
        <path d="M5 50 A45 45 0 0 0 95 50 L65 50 A15 15 0 0 1 35 50 L5 50Z" fill="#f2f2f2"/>
        <circle cx="50" cy="50" r="45" fill="none" stroke="#1a1f2e" stroke-width="4"/>
        <line x1="5" y1="50" x2="35" y2="50" stroke="#1a1f2e" stroke-width="3"/>
        <line x1="65" y1="50" x2="95" y2="50" stroke="#1a1f2e" stroke-width="3"/>
        <circle cx="50" cy="50" r="12" fill="#f2f2f2" stroke="#1a1f2e" stroke-width="3"/>
        <circle cx="50" cy="50" r="6" fill="#ffffff" stroke="#1a1f2e" stroke-width="2"/>
      </svg>
      <h1 class="logo-text">POKéDEX</h1>
    </div>

    <div class="header-right">
      <button class="settings-btn" (click)="toggleMenu()">⚙</button>
      <div class="dropdown" *ngIf="menuOpen">
        <p class="dropdown-label">ENTRENADOR</p>
        <p class="dropdown-name">{{ userName }}</p>
        <hr class="dropdown-divider" />
        <button class="dropdown-logout" (click)="logout()">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <polyline points="16 17 21 12 16 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </svg>
  CERRAR SESIÓN
</button>
      </div>
    </div>
  </header>

  <!-- Contenido principal -->
  <main class="main">
    <div class="title-section">
      <h2 class="main-title">POKéMON</h2>
      <p class="main-subtitle">¿QUé DESEAS HACER, ENTRENADOR?</p>
    </div>

    <div class="cards-grid">
      <div class="menu-card"
        *ngFor="let item of menuItems; let i = index"
        (click)="goTo(item.route)"
        [style.animationDelay]="(0.3 + i * 0.15) + 's'">
        <div class="card-icon">

  <!-- BUSCAR -->
  <svg *ngIf="item.icon === 'search'" width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="4" y="2" width="18" height="24" rx="3" stroke="#e6be32" stroke-width="2"/>
    <line x1="8" y1="8" x2="16" y2="8" stroke="#e6be32" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="13" x2="14" y2="13" stroke="#e6be32" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="18" x2="13" y2="18" stroke="#e6be32" stroke-width="2" stroke-linecap="round"/>
    <circle cx="24" cy="24" r="7" stroke="#e6be32" stroke-width="2"/>
    <path d="M21 24 L23 26 L27 22" stroke="#e6be32" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="29" y1="29" x2="33" y2="33" stroke="#e6be32" stroke-width="2.5" stroke-linecap="round"/>
  </svg>

  <!-- ALEATORIO -->
  <svg *ngIf="item.icon === 'shuffle'" width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M4 10 Q10 10 18 18 Q26 26 32 26" stroke="#e6be32" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M4 26 Q10 26 18 18 Q26 10 32 10" stroke="#e6be32" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M28 7 L32 10 L28 13" stroke="#e6be32" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M28 23 L32 26 L28 29" stroke="#e6be32" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>

  <!-- TIPOS -->
  <svg *ngIf="item.icon === 'layers'" width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M4 10 L7 13 L11 8" stroke="#e6be32" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="15" y1="11" x2="32" y2="11" stroke="#e6be32" stroke-width="2" stroke-linecap="round"/>
    <path d="M4 19 L7 22 L11 17" stroke="#e6be32" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="15" y1="20" x2="32" y2="20" stroke="#e6be32" stroke-width="2" stroke-linecap="round"/>
    <path d="M4 28 L7 31 L11 26" stroke="#e6be32" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="15" y1="29" x2="32" y2="29" stroke="#e6be32" stroke-width="2" stroke-linecap="round"/>
  </svg>
</div>
        <h3 class="card-title">{{ item.title }}</h3>
        <p class="card-desc">{{ item.description }}</p>
      </div>
    </div>

    <!-- Pokeballs decorativas -->
    <div class="deco-balls">
      <svg *ngFor="let b of [0,1,2]" class="mini-ball"
        [style.animationDelay]="(1 + b * 0.15) + 's'"
        width="20" height="20" viewBox="0 0 100 100">
        <path d="M50 5 A45 45 0 0 1 95 50 L65 50 A15 15 0 0 0 35 50 L5 50 A45 45 0 0 1 50 5Z" fill="#cc3333"/>
        <path d="M5 50 A45 45 0 0 0 95 50 L65 50 A15 15 0 0 1 35 50 L5 50Z" fill="#f2f2f2"/>
        <circle cx="50" cy="50" r="45" fill="none" stroke="#1a1f2e" stroke-width="4"/>
        <circle cx="50" cy="50" r="12" fill="#f2f2f2" stroke="#1a1f2e" stroke-width="3"/>
        <circle cx="50" cy="50" r="6" fill="#ffffff" stroke="#1a1f2e" stroke-width="2"/>
      </svg>
    </div>
  </main>
</div>
