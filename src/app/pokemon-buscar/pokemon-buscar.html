<div class="page">
  <div class="bg-overlay"></div>

  <!-- Partículas -->
  <span class="particle" *ngFor="let p of particles"
    [style.left]="p.x" [style.top]="p.y" [style.animationDelay]="p.delay">
  </span>

  <!-- Pokebolas de fondo -->
  <svg *ngFor="let b of bgPokeballs"
    class="bg-pokeball"
    [style.width.px]="b.size" [style.height.px]="b.size"
    [style.left]="b.left" [style.right]="b.right" [style.top]="b.top"
    [style.animationDuration]="b.duration" [style.animationDelay]="b.delay"
    viewBox="0 0 100 100">
    <path d="M50 5 A45 45 0 0 1 95 50 L65 50 A15 15 0 0 0 35 50 L5 50 A45 45 0 0 1 50 5Z" fill="#cc3333"/>
    <path d="M5 50 A45 45 0 0 0 95 50 L65 50 A15 15 0 0 1 35 50 L5 50Z" fill="#f2f2f2"/>
    <line x1="5" y1="50" x2="35" y2="50" stroke="#1a1f2e" stroke-width="3"/>
    <line x1="65" y1="50" x2="95" y2="50" stroke="#1a1f2e" stroke-width="3"/>
    <circle cx="50" cy="50" r="45" fill="none" stroke="#1a1f2e" stroke-width="4"/>
    <circle cx="50" cy="50" r="12" fill="#f2f2f2" stroke="#1a1f2e" stroke-width="3"/>
    <circle cx="50" cy="50" r="6" fill="#ffffff" stroke="#1a1f2e" stroke-width="2"/>
  </svg>

  <!-- Boton para volver -->
  <button class="back-btn" (click)="volver()">← VOLVER</button>

  <div class="content">

    <h2 class="title">BUSCAR POKéMON</h2>
    <p class="subtitle">ESCRIBE EL NOMBRE O NÚMERO</p>

    <!-- Buscador -->
    <div class="search-box">
      <input
        class="search-input"
        type="text"
        [(ngModel)]="pokemonName"
        name="pokemonName"
        placeholder="ej: pikachu"
        (keyup.enter)="buscarPokemon()"
      />
      <button class="search-btn" type="button" (click)="buscarPokemon()" [disabled]="loading">
        <span *ngIf="!loading">BUSCAR</span>
        <span *ngIf="loading">...</span>
      </button>
    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="loading">BUSCANDO POKéMON...</div>

    <!-- Error -->
    <div *ngIf="error && !loading" class="error-msg">⚠ POKéMON NO ENCONTRADO</div>

    <!-- La card que muestra los resultado -->
    <div *ngIf="pokemon && !loading" class="pokemon-card">

      <p class="pokemon-id">#{{ pokemon.id | number:'3.0-0' }}</p>

      <img class="pokemon-img"
        [src]="pokemon.sprites.other['official-artwork'].front_default || pokemon.sprites.front_default"
        [alt]="pokemon.name" />

      <h3 class="pokemon-name">{{ pokemon.name | uppercase }}</h3>

      <div class="types">
        <span *ngFor="let t of pokemon.types"
          class="type-badge"
          [ngClass]="'type-' + t.type.name">
          {{ t.type.name | uppercase }}
        </span>
      </div>

      <div class="stats">
        <div class="stat-row" *ngFor="let s of pokemon.stats">
          <span class="stat-label">{{ s.stat.name | uppercase }}</span>
          <div class="stat-bar-bg">
            <div class="stat-bar" [style.width.%]="(s.base_stat / 255) * 100"></div>
          </div>
          <span class="stat-value">{{ s.base_stat }}</span>
        </div>
      </div>

    </div>
  </div>
</div>
