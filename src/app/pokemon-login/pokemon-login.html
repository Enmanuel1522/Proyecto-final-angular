<div class="page">
  <!-- Background overlay -->
  <div class="bg-overlay"></div>

  <!-- Floating particles -->
  <div *ngFor="let p of particles"
    class="particle"
    [style.left]="p.x"
    [style.top]="p.y"
    [style.animationDelay]="p.delay">
  </div>

  <!-- Background floating pokeballs -->
  <svg *ngFor="let b of bgPokeballs"
    class="bg-pokeball"
    [style.width.px]="b.size"
    [style.height.px]="b.size"
    [style.left]="b.left"
    [style.right]="b.right"
    [style.top]="b.top"
    [style.animationDuration]="b.duration"
    [style.animationDelay]="b.delay"
    viewBox="0 0 100 100">
    <path d="M50 5 A45 45 0 0 1 95 50 L65 50 A15 15 0 0 0 35 50 L5 50 A45 45 0 0 1 50 5Z" fill="#cc3333"/>
    <path d="M5 50 A45 45 0 0 0 95 50 L65 50 A15 15 0 0 1 35 50 L5 50Z" fill="#f2f2f2"/>
    <line x1="5" y1="50" x2="35" y2="50" stroke="#1a1f2e" stroke-width="3"/>
    <line x1="65" y1="50" x2="95" y2="50" stroke="#1a1f2e" stroke-width="3"/>
    <circle cx="50" cy="50" r="45" fill="none" stroke="#1a1f2e" stroke-width="4"/>
    <circle cx="50" cy="50" r="12" fill="#f2f2f2" stroke="#1a1f2e" stroke-width="3"/>
    <circle cx="50" cy="50" r="6" fill="#ffffff" stroke="#1a1f2e" stroke-width="2"/>
  </svg>

  <!-- Login Card -->
  <div class="login-card">
    <!-- Pokeball top decoration -->
    <div class="pokeball-top">
      <svg width="68" height="68" viewBox="0 0 100 100" class="pokeball-spin">
        <path d="M 50 5 A 45 45 0 0 1 95 50 L 65 50 A 15 15 0 0 0 35 50 L 5 50 A 45 45 0 0 1 50 5 Z" fill="#cc3333"/>
        <path d="M 5 50 A 45 45 0 0 0 95 50 L 65 50 A 15 15 0 0 1 35 50 L 5 50 Z" fill="#f2f2f2"/>
        <line x1="5" y1="50" x2="35" y2="50" stroke="#1a1f2e" stroke-width="3"/>
        <line x1="65" y1="50" x2="95" y2="50" stroke="#1a1f2e" stroke-width="3"/>
        <circle cx="50" cy="50" r="45" fill="none" stroke="#1a1f2e" stroke-width="4"/>
        <circle cx="50" cy="50" r="12" fill="#f2f2f2" stroke="#1a1f2e" stroke-width="3"/>
        <circle cx="50" cy="50" r="6" fill="#ffffff" stroke="#1a1f2e" stroke-width="2"/>
      </svg>
    </div>

    <!-- Header -->
    <div class="header">
      <h1 class="title">POKéMON</h1>
      <p class="subtitle">INICIAR SESIóN COMO FORMADOR</p>
    </div>

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="field">
        <label class="label">IDENTIFICACIóN DEL ENTRENADOR</label>
        <input
          type="email"
          formControlName="email"
          placeholder="ash@pokemon.com"
          class="input"
        />
        <div *ngIf="email?.touched && email?.invalid" class="error">
          <span *ngIf="email?.errors?.['required']">SOLICITUD DE IDENTIFICACIóN DEL ENTRENADOR</span>
          <span *ngIf="email?.errors?.['email']">ID INVáLIDO</span>
        </div>
      </div>

      <div class="field">
        <label class="label">CóDIGO SECRETO</label>
        <input
          type="password"
          formControlName="password"
          placeholder="••••••••"
          class="input"
        />
        <div *ngIf="password?.touched && password?.invalid" class="error">
          <span *ngIf="password?.errors?.['required']">CóDIGO REQUERIDO</span>
          <span *ngIf="password?.errors?.['minlength']">MíNIMO 6 CARACTERES</span>
        </div>
      </div>

      <button type="submit" [disabled]="isLoading" class="submit-btn">
        <span *ngIf="!isLoading">¡TE ELIJO A TI!</span>
        <span *ngIf="isLoading" class="blink">CAPTURANDO...</span>
      </button>
      <div *ngIf="loginError" class="error-login">
        ENTRENADOR NO REGISTRADO
    </div>
    </form>

    <!-- Footer -->
    <div class="footer">
      <p>¿NUEVO ENTRENADOR? <span class="register-link">REGISTRADOR</span></p>
    </div>

    <!-- Bottom pokeballs -->
    <div class="bottom-pokeballs">
      <svg *ngFor="let i of [0,1,2]" width="22" height="22" viewBox="0 0 100 100"
        class="pokeball-spin"
        [style.animationDelay]="(i * 0.5) + 's'">
        <path d="M 50 5 A 45 45 0 0 1 95 50 L 65 50 A 15 15 0 0 0 35 50 L 5 50 A 45 45 0 0 1 50 5 Z" fill="#cc3333"/>
        <path d="M 5 50 A 45 45 0 0 0 95 50 L 65 50 A 15 15 0 0 1 35 50 L 5 50 Z" fill="#f2f2f2"/>
        <line x1="5" y1="50" x2="35" y2="50" stroke="#1a1f2e" stroke-width="3"/>
        <line x1="65" y1="50" x2="95" y2="50" stroke="#1a1f2e" stroke-width="3"/>
        <circle cx="50" cy="50" r="45" fill="none" stroke="#1a1f2e" stroke-width="4"/>
        <circle cx="50" cy="50" r="12" fill="#f2f2f2" stroke="#1a1f2e" stroke-width="3"/>
        <circle cx="50" cy="50" r="6" fill="#ffffff" stroke="#1a1f2e" stroke-width="2"/>
      </svg>
    </div>
  </div>
