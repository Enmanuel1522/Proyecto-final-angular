<div class="page">
  <div class="bg-overlay"></div>

  <!-- Partículas -->
  <span class="particle" *ngFor="let p of particles"
    [style.left]="p.x" [style.top]="p.y" [style.animationDelay]="p.delay">
  </span>

  <!-- Pokebolas de fondo -->
  <svg *ngFor="let b of bgPokeballs"
    class="bg-pokeball"
    [style.width.px]="b.size" [style.height.px]="b.size"
    [style.left]="b.left" [style.right]="b.right" [style.top]="b.top"
    [style.animationDuration]="b.duration" [style.animationDelay]="b.delay"
    viewBox="0 0 100 100">
    <path d="M50 5 A45 45 0 0 1 95 50 L65 50 A15 15 0 0 0 35 50 L5 50 A45 45 0 0 1 50 5Z" fill="#cc3333"/>
    <path d="M5 50 A45 45 0 0 0 95 50 L65 50 A15 15 0 0 1 35 50 L5 50Z" fill="#f2f2f2"/>
    <line x1="5" y1="50" x2="35" y2="50" stroke="#1a1f2e" stroke-width="3"/>
    <line x1="65" y1="50" x2="95" y2="50" stroke="#1a1f2e" stroke-width="3"/>
    <circle cx="50" cy="50" r="45" fill="none" stroke="#1a1f2e" stroke-width="4"/>
    <circle cx="50" cy="50" r="12" fill="#f2f2f2" stroke="#1a1f2e" stroke-width="3"/>
    <circle cx="50" cy="50" r="6" fill="#ffffff" stroke="#1a1f2e" stroke-width="2"/>
  </svg>

  <!-- Botón volver -->
  <button class="back-btn" (click)="volver()">← VOLVER</button>

  <!-- Contenido con scroll -->
  <div class="content">

    <h2 class="title">TIPOS DE POKéMON</h2>
    <p class="subtitle">SELECCIONA UN TIPO PARA EXPLORAR</p>

    <!-- Botones de tipos -->
    <div class="tipos-grid">
      <button
        *ngFor="let tipo of tipos"
        class="tipo-btn"
        [ngClass]="tipo.name"
        [class.active]="tipoActivo === tipo.name"
        (click)="seleccionarTipo(tipo.name)">
        {{ tipo.name | uppercase }}
      </button>
    </div>

    <!-- cargandoooo -->
    <div *ngIf="loading" class="loading">CARGANDO POKéMON...</div>

    <!-- Grid de pokémon -->
    <div *ngIf="pokemons.length > 0 && !loading" class="pokemon-grid">
      <div *ngFor="let p of pokemons" class="pokemon-card">
        <img [src]="p.image" [alt]="p.name" />
        <h4>{{ p.name | uppercase }}</h4>
      </div>
    </div>

  </div>
</div>
